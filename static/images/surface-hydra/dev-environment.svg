<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280" font-family="system-ui, -apple-system, sans-serif" font-size="12">

  <!-- Claude Code -->
  <rect x="170" y="15" width="160" height="45" rx="4" fill="none" stroke="#888" stroke-width="1.5"/>
  <text x="250" y="38" fill="#ccc" text-anchor="middle" font-size="13" font-weight="bold">Claude Code</text>
  <text x="250" y="52" fill="#666" text-anchor="middle" font-size="10">Ubuntu host</text>

  <!-- SSH lines down from Claude box to VMs -->
  <line x1="195" y1="60" x2="80" y2="110" stroke="#666" stroke-width="1"/>
  <line x1="250" y1="60" x2="250" y2="110" stroke="#666" stroke-width="1"/>
  <line x1="305" y1="60" x2="420" y2="110" stroke="#666" stroke-width="1"/>
  <text x="275" y="82" fill="#666" font-size="10">SSH</text>

  <!-- Reference VM -->
  <rect x="18" y="110" width="125" height="80" rx="4" fill="none" stroke="#888" stroke-width="1.5"/>
  <text x="80" y="133" fill="#ccc" text-anchor="middle" font-size="12" font-weight="bold">Win 7 32-bit</text>
  <text x="80" y="150" fill="#777" text-anchor="middle" font-size="10">reference</text>
  <text x="80" y="170" fill="#666" text-anchor="middle" font-size="9">original Hydra.sys</text>

  <!-- Target VM -->
  <rect x="188" y="110" width="125" height="80" rx="4" fill="none" stroke="#888" stroke-width="1.5"/>
  <text x="250" y="133" fill="#ccc" text-anchor="middle" font-size="12" font-weight="bold">Win 11 64-bit</text>
  <text x="250" y="150" fill="#777" text-anchor="middle" font-size="10">target</text>
  <text x="250" y="170" fill="#666" text-anchor="middle" font-size="9">new Rust driver</text>

  <!-- Debugger VM -->
  <rect x="358" y="110" width="125" height="80" rx="4" fill="none" stroke="#888" stroke-width="1.5"/>
  <text x="420" y="133" fill="#ccc" text-anchor="middle" font-size="12" font-weight="bold">Win 11 64-bit</text>
  <text x="420" y="150" fill="#777" text-anchor="middle" font-size="10">debugger</text>
  <text x="420" y="170" fill="#666" text-anchor="middle" font-size="9">WinDbg</text>

  <!-- Serial connection between target and debugger -->
  <line x1="313" y1="150" x2="358" y2="150" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="335" y="142" fill="#888" text-anchor="middle" font-size="9">serial</text>

  <!-- Hydra card -->
  <rect x="50" y="215" width="270" height="35" rx="4" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="185" y="237" fill="#999" text-anchor="middle" font-size="11">Hydra PCI card (one VM at a time)</text>
  <line x1="100" y1="215" x2="80" y2="190" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="250" y1="215" x2="250" y2="190" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>

</svg>